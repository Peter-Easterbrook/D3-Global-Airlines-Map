<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="favicon/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="favicon/favicon-16x16.png"
    />

    <link
      rel="mask-icon"
      href="favicon/safari-pinned-tab.svg"
      color="#5bbad5"
    />

    <link rel="stylesheet" href="style.css" />
    <title>D3 Airlines Routes</title>
    <script src="d3.js" defer></script>
    <script src="main.js" defer></script>
  </head>

  <body>
    <canvas id="thpace"></canvas>
    <h2>D3 Airlines Routes</h2>

    <div class="mainView">
      <div class="center">
        <h3>Airlines</h3>
        <svg id="AirlinesChart"></svg>
      </div>
      <div class="center">
        <h3>Airports</h3>
        <svg id="Map"></svg>
      </div>
    </div>
  </body>
  <script src="thpace.min.js"></script>
  <script>
    const canvas = document.getElementById('thpace');

    const d3settings = {
      colors: ['#000', '#0069d2', '#000'],
      triangleSize: 65,
    };

    ThpaceGL.create(canvas, d3settings);
  </script>
</html>
